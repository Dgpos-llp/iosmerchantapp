<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 100 100">
    <!-- Server Body -->

    <!-- Server Lid -->
    <rect x="20" y="20" width="60" height="20" rx="5" ry="3" fill="#2e3140" />
    <rect x="20" y="40" width="60" height="20" rx="5" ry="3" fill="#3e414c" />
    <rect x="20" y="60" width="60" height="20" rx="5" ry="3" fill="#6f6f71" />

    <!-- Status Lights (Aligned Vertically) -->
    <circle cx="30" cy="30" r="5" fill="red">
        <animate attributeName="opacity" from="1" to="0" dur="0.2s" begin="0s;blink.end" repeatCount="indefinite" />
    </circle>

    <circle cx="30" cy="50" r="5" fill="orange">
        <animate attributeName="opacity" from="1" to="0" dur="0.8s" begin="0s;blink.end" repeatCount="indefinite" />
    </circle>

    <circle cx="30" cy="70" r="5" fill="red">
        <animate attributeName="opacity" from="1" to="0" dur="2.0s" begin="0s;blink.end" repeatCount="indefinite" />
    </circle>
</svg>
